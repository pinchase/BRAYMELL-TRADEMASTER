<article class="project-card">
    {% if project.featured %}
        <span class="badge">Featured</span>
    {% endif %}
    <a href="/case-study/{{ project.slug }}/" class="project-media" aria-label="View {{ project.title }}">
        {% if project.brand.logo %}
            <img src="{{ project.brand.logo.url }}" alt="{{ project.brand.name }}" loading="lazy">
        {% else %}
            <span class="placeholder">No Logo</span>
        {% endif %}
    </a>
    <div class="project-body">
        <p class="project-client">{{ project.brand.client.name }} / {{ project.brand.name }}</p>
        <h3>{{ project.title }}</h3>
        <a href="/case-study/{{ project.slug }}/" class="text-link">View Project</a>
    </div>
</article>
